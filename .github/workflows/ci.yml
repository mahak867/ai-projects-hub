name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check all Python files compile
        run: |
          echo "Checking syntax for all .py files..."
          FAILED=0
          while IFS= read -r -d '' f; do
            python3 -m py_compile "$f" && echo "✓ $f" || { echo "✗ FAIL: $f"; FAILED=1; }
          done < <(find . -name "*.py" -not -path "./.git/*" -not -path "*/__pycache__/*" -print0)
          [ $FAILED -eq 0 ] && echo "All files pass ✓" || exit 1

  structure-check:
    name: Project Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every project has required files
        run: |
          FAILED=0
          for dir in [0-9][0-9]-*/; do
            [ -f "$dir/README.md" ]        || { echo "Missing README.md in $dir"; FAILED=1; }
            [ -f "$dir/requirements.txt" ] || { echo "Missing requirements.txt in $dir"; FAILED=1; }
            [ -f "$dir/.env.example" ]     || { echo "Missing .env.example in $dir"; FAILED=1; }
          done
          [ $FAILED -eq 0 ] && echo "All projects have required files ✓" || exit 1

      - name: Check no .env files are tracked
        run: |
          if git ls-files | grep -E '^.*\.env$' | grep -v '.env.example'; then
            echo "ERROR: .env file is tracked by git — remove it immediately and revoke any exposed keys"
            exit 1
          fi
          echo "No .env files tracked ✓"

      - name: Check .gitignore exists and covers .env
        run: |
          [ -f ".gitignore" ] || { echo "Missing .gitignore"; exit 1; }
          grep -q "\.env" .gitignore || { echo ".gitignore does not cover .env files"; exit 1; }
          echo ".gitignore OK ✓"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff
        run: ruff check --select F821,F811,E9 .

  smoke-test:
    name: Smoke Test — ${{ matrix.project.dir }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - { dir: "08-multi-agent-research",        entry: "research.py"    }
          - { dir: "11-ai-code-reviewer",             entry: "review.py"      }
          - { dir: "18-document-intelligence",        entry: "extractor.py"   }
          - { dir: "20-context-engineering-cookbook", entry: "examples/pattern_1_structured_output.py" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for ${{ matrix.project.dir }}
        run: pip install --quiet -r ${{ matrix.project.dir }}/requirements.txt

      - name: Smoke-test imports for ${{ matrix.project.dir }}
        env:
          ANTHROPIC_API_KEY: smoke-test-dummy-key-ci
        run: |
          python - << 'PYEOF'
          import importlib.util, sys
          entry = "${{ matrix.project.dir }}/${{ matrix.project.entry }}"
          spec = importlib.util.spec_from_file_location("_smoke", entry)
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print("✓", entry, "— imports OK")
          PYEOF

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded API keys..."
          # Match real keys: sk-ant-api03- followed by real base64 chars (not placeholder xxx/your_key/...)
          # Excludes: the CI file itself, and placeholder examples like sk-ant-api03-xxx
          MATCHES=$(grep -rE "sk-ant-api[0-9]+-[A-Za-z0-9_-]{20,}" \
            --include="*.py" --include="*.json" \
            --exclude-dir=".git" \
            . 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Real Anthropic API key detected in source code:"
            echo "$MATCHES"
            echo "Revoke it immediately at https://console.anthropic.com"
            exit 1
          fi
          echo "No hardcoded secrets found ✓"
